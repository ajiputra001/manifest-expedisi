<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Approval | Manifest Ekspedisi</title>
  <link rel="stylesheet" href="style.css?v=6">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 40px;
      font-family: 'Inter', sans-serif;
    }
    .admin-container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 30px;
      box-shadow: var(--shadow-lg);
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    .admin-title {
      font-size: 24px;
      font-weight: 800;
    }
    .admin-subtitle {
      color: var(--text-secondary);
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    th {
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    .status-badge {
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }
    .status-pending {
      background: rgba(245, 158, 11, 0.1);
      color: var(--accent-orange);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .status-approved {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-green);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .btn-approve {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-green);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-approve:hover {
      background: rgba(16, 185, 129, 0.2);
    }
    .btn-reject {
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-red);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      margin-left: 8px;
      transition: all 0.2s;
    }
    .btn-reject:hover {
      background: rgba(239, 68, 68, 0.2);
    }
    .btn-back {
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      padding: 10px 20px;
      border-radius: var(--radius-md);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-back:hover {
      background: var(--bg-card-hover);
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="admin-container">
    <div class="admin-header">
      <div>
        <h1 class="admin-title">🛡️ Developer Admin Panel</h1>
        <div class="admin-subtitle">Pusat Persetujuan Pengguna (Approval System)</div>
      </div>
      <a href="index.html" class="btn-back">Ke Dashboard Utama</a>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nama Pengguna</th>
          <th>Username</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="adminTableBody">
        <!-- Data populated by JS -->
      </tbody>
    </table>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
