<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Manifest Ekspedisi</title>
  <link rel="stylesheet" href="style.css?v=6">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
      overflow: hidden;
      margin: 0;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      text-align: center;
      position: relative;
      z-index: 10;
    }
    .auth-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      box-shadow: var(--shadow-glow-blue);
    }
    .auth-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 30px;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }
    .auth-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .auth-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.2s;
    }
    .auth-input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .btn-auth {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }
    .auth-switch {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .auth-switch a {
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .auth-switch a:hover {
      text-decoration: underline;
    }
    
    /* Decorative blobs */
    .blob {
      position: absolute;
      filter: blur(80px);
      z-index: 1;
      opacity: 0.5;
    }
    .blob-1 {
      top: -100px;
      left: -100px;
      width: 300px;
      height: 300px;
      background: var(--accent-blue-glow);
      border-radius: 50%;
    }
    .blob-2 {
      bottom: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      background: var(--accent-purple-glow);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <!-- Decorative Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- LOGIN CONTAINER -->
  <div class="auth-container" id="loginView">
    <div class="auth-logo">📦</div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sistem Manajemen Manifest Ekspedisi</p>
    
    <div class="auth-form">
      <div class="auth-input-group">
        <label class="auth-label">Username</label>
        <input type="text" class="auth-input" id="loginUsername" placeholder="Masukkan username">
      </div>
      <div class="auth-input-group">
        <label class="auth-label">Password</label>
        <input type="password" class="auth-input" id="loginPassword" placeholder="Masukkan password">
      </div>
      <button class="btn-auth" onclick="handleLogin()">Login ke Sistem</button>
    </div>
    
    <div class="auth-switch">
      Belum punya akun? <a onclick="toggleAuthView('register')">Daftar sekarang</a>
    </div>
  </div>

  <!-- REGISTER CONTAINER -->
  <div class="auth-container" id="registerView" style="display: none;">
    <div class="auth-logo">📝</div>
    <h1 class="auth-title">Buat Akun</h1>
    <p class="auth-subtitle">Daftar untuk mengakses sistem</p>
    
    <div class="auth-form">
      <div class="auth-input-group">
        <label class="auth-label">Nama Lengkap</label>
        <input type="text" class="auth-input" id="regName" placeholder="Contoh: Budi Santoso">
      </div>
      <div class="auth-input-group">
        <label class="auth-label">Username</label>
        <input type="text" class="auth-input" id="regUsername" placeholder="Pilih username">
      </div>
      <div class="auth-input-group">
        <label class="auth-label">Password</label>
        <input type="password" class="auth-input" id="regPassword" placeholder="Buat password">
      </div>
      <button class="btn-auth" onclick="handleRegister()">Kirim Pengajuan</button>
    </div>
    
    <div class="auth-switch">
      Sudah punya akun? <a onclick="toggleAuthView('login')">Login disini</a>
    </div>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
